<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Discussions</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Boldonse&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<script type="module" src="js/app.js"></script>
</head>

<body>
<div class="app">

  <header class="feed-header">
    <div class="welcome-row">
      <img class="user maya" src="assets/maya.jpeg" alt="Maya" />
      <h1>Hi Maya!</h1>
      <button class="search-btn" type="button"><img src="assets/icon-search.png"></button>
    </div>
    <div class="nav-pills">
      <button class="nav-pill" type="button">Product Verdicts</button>
      <button class="nav-pill nav-pill--active" type="button">Discussions</button>
    </div>
  </header>

  <main class="feed-main">
    <h1>Community topics</h1>

    <div class="chip-row">
      <button class="chip chip--active" type="button">All x</button>
      <button class="chip" type="button">Is it worth it</button>
      <button class="chip" type="button">Need opinions</button>
      <button class="chip" type="button">Girl News</button>
      <button class="chip" type="button">Red flag</button>
      <button class="chip" type="button">Regret Purchase</button>
      <button class="chip" type="button">Money talks</button>
      <button class="chip" type="button">Girl Math</button>
      <button class="chip" type="button">Pink tax alert</button>
    </div>

    <!-- ↓ This is now empty — app.js fills it from the database -->
    <div id="feed"></div>

    <button class="load-more" type="button">
      <span class="load-more-icon">⟳</span>
      <span>Load more posts</span>
    </button>
  </main>

</div>
</body>
</html>
